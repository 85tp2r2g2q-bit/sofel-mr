<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>SOFEL-MR генератор на оферти</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
	<script src="ko/ko-min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

	<!-- html2pdf (bundle includes html2canvas + jsPDF) -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
	<link rel="stylesheet" href="style.css">
</head>

<body class="p-4">
	<div class="container">
		<div class="row">
			<div class="col-md-6">
				<div class="card p-3">
					<h5 class="mb-3">Данни за артикула</h5>
					<div class="mb-3">
						<label class="form-label">Език</label>
						<select class="form-select" data-bind="value: selectedLanguage">
							<option value="bg">Български</option>
							<option value="en">English</option>
						</select>
					</div>
					<!-- Нов селект за пликове -->
					<div class="mb-3">
					<label class="form-label">Избор на продукт</label>
					<select class="form-select"
						data-bind="options: envelopes, optionsText: envelopeOptionText, optionsValue: 'id', value: selectedEnvelopeId, optionsCaption: 'моля избери'"></select>
				</div>
				<div data-bind="visible: selectedEnvelope()">

				<!-- Селект за материал (зависи от избрания плик) -->
				<div class="mb-3">
					<label class="form-label">Материал</label>
					<select class="form-select"
						data-bind="options: materialsForSelected, optionsText: materialOptionText, optionsValue: 'id', value: selectedMaterialId, enable: materialsForSelected().length > 0"></select>
				</div>


				<!-- (Moved) Export / Print buttons will appear below Quantity -->

				<!-- Controls -->
				<div class="mb-3">
					<label class="form-label">Грамаж на хартията</label>
					<div class="dual-input-row">
						<select class="form-select"
							data-bind="visible: paperGrammageOptions().length > 0, options: paperGrammageOptions, value: paperGrammageSelectedOption, optionsCaption: 'Избери грамаж'"></select>
						<input type="text" class="form-control"
							data-bind="textInput: paperGrammage, attr: { placeholder: paperGrammageOptions().length > 0 ? 'или въведи ръчно' : '' }" />
					</div>
				</div>
				<div class="mb-3" data-bind="visible: showFoilGrammage">
					<label class="form-label">Грамаж на фолио/прозорец</label>
					<div class="dual-input-row">
						<select class="form-select"
							data-bind="visible: foilGrammageOptions().length > 0, options: foilGrammageOptions, value: foilGrammageSelectedOption, optionsCaption: 'Избери грамаж'"></select>
						<input type="text" class="form-control"
							data-bind="textInput: foilGrammage, attr: { placeholder: foilGrammageOptions().length > 0 ? 'или въведи ръчно' : '' }" />
					</div>
				</div>
				<div class="mb-3">
					<label class="form-label">Ширина A</label>
					<div class="dual-input-row">
						<select class="form-select"
							data-bind="visible: widthAOptions().length > 0, options: widthAOptions, value: widthASelectedOption, optionsCaption: 'Избери ширина A'"></select>
						<input type="text" class="form-control"
							data-bind="textInput: widthA, attr: { placeholder: widthAOptions().length > 0 ? 'или въведи ръчно' : '' }" />
					</div>
				</div>
				<div class="mb-3" data-bind="visible: !isPaperFormatSelected()">
					<label class="form-label">Фалт B</label>
					<div class="dual-input-row">
						<select class="form-select"
							data-bind="visible: foldBOptions().length > 0, options: foldBOptions, value: foldBSelectedOption, optionsCaption: 'Избери Фалт B'"></select>
						<input type="text" class="form-control"
							data-bind="textInput: foldB, attr: { placeholder: foldBOptions().length > 0 ? 'или въведи ръчно' : '' }" />
					</div>
				</div>
				<div class="mb-3">
					<label class="form-label">Дължина C</label>
					<div class="dual-input-row">
						<select class="form-select"
							data-bind="visible: lengthCOptions().length > 0, options: lengthCOptions, value: lengthCSelectedOption, optionsCaption: 'Избери Дължина C'"></select>
						<input type="text" class="form-control"
							data-bind="textInput: lengthC, attr: { placeholder: lengthCOptions().length > 0 ? 'или въведи ръчно' : '' }" />
					</div>
				</div>
				<div class="mb-3" data-bind="visible: showAdvancedPricingFields">
					<label class="form-label">Ширина на хартията</label>
					<input type="number" step="any" class="form-control readonly-field" readonly
						data-bind="value: paperWidth" />
				</div>
				<div class="mb-3" data-bind="visible: showAdvancedPricingFields">
					<label class="form-label">Дължина на отрязък</label>
					<input type="number" step="any" class="form-control readonly-field" readonly
						data-bind="textInput: cutLength" />
				</div>
				<!-- Ръчно поле Прозорец (под Дължина на отрязък), видимо само за плик с прозорец -->
				<div class="mb-3" data-bind="visible: showWindowGrammage">
					<label class="form-label">Прозорец (мм)</label>
					<input type="number" step="any" class="form-control"
						data-bind="value: windowManual, valueUpdate: 'afterkeydown'" />
				</div>
				<!-- Ширина на прозорец (само за плик id=5) - readonly, изчислява се от Прозорец + 4 -->
			<div class="mb-3" data-bind="visible: showAdvancedPricingFields">
				<label class="form-label">Ширина на прозорец (мм)</label>
				<input type="number" step="any" class="form-control readonly-field" readonly
					data-bind="value: windowWidth" />
			</div>
				<div class="mb-3">
					<label class="form-label">Цена на хартия /€ без ДДС</label>
					<input type="number" step="any" class="form-control"
						data-bind="value: paperPriceEur, valueUpdate: 'afterkeydown'" />
				</div>
				<!-- Цена на фолио /€ без ДДС (видимо за пликове с фолио/прозорец) -->
				<div class="mb-3" data-bind="visible: showFoilGrammage">
					<label class="form-label">Цена на фолио/прозорец/ /€ без ДДС</label>
					<input type="number" step="any" class="form-control"
						data-bind="value: foilPriceEur, valueUpdate: 'afterkeydown'" />
				</div>
				<div class="mb-3" data-bind="visible: printColorsForSelected().length > 0">
					<label class="form-label">Печат / брой цветове</label>
					<select class="form-select"
						data-bind="options: printColorsForSelected, value: selectedPrintColor, optionsText: function(v){ return v.count === 0 ? 'без печат' : ((v.count === 1 ? '1 цвят' : v.count + ' цвята') + ' / ' + v.value + '%'); }"></select>
				</div>
				<div class="mb-3" data-bind="visible: showAdvancedPricingFields">
					<label class="form-label">Тегло на 1 плик /гр</label>
					<input type="number" step="any" class="form-control readonly-field" readonly
						data-bind="value: envelopeWeightGr, valueUpdate: 'afterkeydown'" />
				</div>
				<!-- Calculated foil weight per envelope (visible when foil option enabled) -->
				<div class="mb-3" data-bind="visible: showAdvancedPricingFields">
					<label class="form-label">Тегло на 1 плик /гр фолио</label>
					<input type="number" step="any" class="form-control readonly-field" readonly
						data-bind="value: envelopeFoilWeightGr, valueUpdate: 'afterkeydown'" />
				</div>
				<div class="mb-3" data-bind="visible: showAdvancedPricingFields() || isPaperFormatSelected()">
					<label class="form-label">Брой пликове в 1 кг</label>
					<input type="number" step="any" class="form-control readonly-field" readonly
						data-bind="value: envelopesPerKg, valueUpdate: 'afterkeydown'" />
				</div>
				<!-- Calculated number of envelopes per kg for foil (visible when foil option enabled) -->
				<div class="mb-3" data-bind="visible: showAdvancedPricingFields">
					<label class="form-label">Брой пликове в 1 кг фолио</label>
					<input type="number" step="any" class="form-control readonly-field" readonly
						data-bind="value: envelopesPerKgFoil, valueUpdate: 'afterkeydown'" />
				</div>
				<div class="mb-3" data-bind="visible: showAdvancedPricingFields">
					<label class="form-label">Себестойност на 1 плик /€</label>
					<input type="number" step="any" class="form-control readonly-field" readonly
						data-bind="value: materialCostPerEnvelopeEur, valueUpdate: 'afterkeydown'" />
				</div>
				<!-- Себестойност на 1 плик за фолио (видимо само за плик id=3) -->
				<div class="mb-3" data-bind="visible: showAdvancedPricingFields">
					<label class="form-label">Себестойност на 1 плик (фолио) /лв</label>
					<input type="number" step="any" class="form-control readonly-field" readonly
						data-bind="value: foilCostPerEnvelopeEur, valueUpdate: 'afterkeydown'" />
				</div>
				<div class="mb-3" data-bind="visible: showAdvancedPricingFields">
					<label class="form-label">Разход за труд и материали /€</label>
					<input type="number" step="any" class="form-control readonly-field" readonly
						data-bind="value: laborAndOverheadEur, valueUpdate: 'afterkeydown'" />
				</div>
				<div class="mb-3" data-bind="visible: showAdvancedPricingFields">
					<label class="form-label">Обща себестойност материал + труд /€</label>
					<input type="number" step="any" class="form-control readonly-field" readonly
						data-bind="value: totalCostPerEnvelopeEur, valueUpdate: 'afterkeydown'" />
				</div>
				<!-- Нов падащ списък: количество -->
				<div class="mb-3">
					<label class="form-label">Тираж по запитване от клиент /бр</label>
					<select class="form-select" data-bind="options: quantitiesForSelected, value: selectedQuantity, optionsText: function(q){ return formatQuantity(q.qty); }, enable: quantitiesForSelected().length > 0"></select>
				</div>
				<div class="mb-3" data-bind="visible: showAdvancedPricingFields">
					<label class="form-label">ОБЩО ХАРТИЯ ЗА ТИРАЖА /кг</label>
					<input type="number" step="any" class="form-control readonly-field" readonly
						data-bind="value: totalPaperForQuantityKg, valueUpdate: 'afterkeydown'" />
				</div>
				<div class="mb-3" data-bind="visible: showAdvancedPricingFields">
					<label class="form-label">ЦЕНА ЗА ПЕЧАТ ТРУД / 0,44 ЛВ/КГ/</label>
					<input type="number" step="any" class="form-control readonly-field" readonly
						data-bind="value: printLaborPriceEur, valueUpdate: 'afterkeydown'" />
				</div>
				<div class="mb-3" data-bind="visible: showAdvancedPricingFields">
					<label class="form-label">Стойност на хартията /€</label>
					<input type="number" step="any" class="form-control readonly-field" readonly
						data-bind="value: paperValueTotalEur, valueUpdate: 'afterkeydown'" />
				</div>
				<div class="mb-3" data-bind="visible: showAdvancedPricingFields">
					<label class="form-label">Стойност на труда и други разходи /€</label>
					<input type="number" step="any" class="form-control readonly-field" readonly
						data-bind="value: laborValueTotalEur, valueUpdate: 'afterkeydown'" />
				</div>
				<div class="mb-3">
					<label class="form-label">Ценово предимство</label>
					<select class="form-select"
						data-bind="options: priceIndexes, optionsText: 'name', optionsValue: 'idx', value: selectedPriceIndex"></select>
				</div>
				<div class="mb-3">
					<label class="form-label fw-bold" data-bind="text: isPaperBagSelected() ? 'ЦЕНА ЗА ЧАНТА БЕЗ ПЕЧАТ КЛИЕНТА EUR БЕЗ ДДС' : 'Цена според запитването на клиента'"></label>
					<input type="number" step="any" class="form-control readonly-field fw-bold" readonly
						data-bind="value: customerInquiryPriceEur, valueUpdate: 'afterkeydown'" />
				</div>
				<div class="mb-3" data-bind="visible: isPaperBagSelected">
					<label class="form-label fw-bold">ЦЕНА ЗА ЧАНТА С ПЕЧАТ EUR БЕЗ ДДС</label>
					<div class="d-flex align-items-center gap-3">
						<input type="number" step="any" class="form-control readonly-field fw-bold" readonly
							data-bind="value: bagWithPrintPriceEur, valueUpdate: 'afterkeydown'" />
						<div class="form-check mb-0">
							<input class="form-check-input" type="checkbox" id="use-bag-print-price"
								data-bind="checked: useBagWithPrintPriceInOffer" />
							<label class="form-check-label" for="use-bag-print-price">Използвай в офертата</label>
						</div>
					</div>
				</div>
				<div class="mb-3">
					<label class="form-label">КРАЙНА СЕБЕСТОЙНОСТ НА ГОТОВ ПРОДУКТ</label>
					<table class="table table-sm table-bordered mb-0">
						<thead class="table-light">
							<tr>
								<th>Тираж /бр</th>
								<th data-bind="text: isPaperFormatSelected() ? 'Цена /€ за 1 кг' : 'Цена /€ за 1 бр'"></th>
								<th data-bind="visible: isPaperBagSelected">Цена с печат /€ за 1 бр</th>
							</tr>
						</thead>
						<tbody data-bind="foreach: allQuantityPrices">
							<tr>
								<td data-bind="text: $root.formatQuantity(qty)"></td>
								<td data-bind="text: pricePerUnit"></td>
								<td data-bind="visible: $root.isPaperBagSelected, text: bagWithPrintPricePerUnit"></td>
							</tr>
						</tbody>
					</table>
				</div>
				<div class="mt-3 d-flex justify-content-end">
					<button class="btn btn-outline-secondary" data-bind="click: addToOffer">Добави към оферта</button>
				</div>
					<!-- Показване на стойността (количество * цена) -->
				</div>
				</div>
			</div>
			

			<div class="col-md-6">
				<div class="card p-3">
					<h5>Получател</h5>
					<div class="mb-3">
						<label class="form-label">Избор на получател</label>
						<select class="form-select" data-bind="options: recipients, optionsText: 'label', optionsValue: 'id', value: selectedRecipientId, optionsCaption: '— избери —'"></select>
					</div>
					<div class="mb-3">
						<label class="form-label">До</label>
						<input type="text" class="form-control" data-bind="value: recipientCompany" />
					</div>
					<div class="mb-3">
						<label class="form-label">На вниманието на</label>
						<input type="text" class="form-control" data-bind="value: attentionName" />
					</div>
					<div class="mb-3">
						<label class="form-label">Телефон</label>
						<input type="text" class="form-control" data-bind="value: recipientPhone" />
					</div>
					<div class="mb-3">
						<label class="form-label">Имейл адрес</label>
						<input type="email" class="form-control" data-bind="value: recipientEmail" />
					</div>
					<div class="mb-3">
						<label class="form-label">По запитване</label>
						<input type="text" class="form-control" data-bind="value: inquiryFrom" />
					</div>
				</div>
			</div>
			<div class="col-12 mt-3">
				<div class="card p-3">
					<h5>Данни за офертата</h5>
					<div class="mb-3">
						<label class="form-label">Издадена от</label>
						<select class="form-select" data-bind="options: issuerOptions, optionsText: 'name', optionsValue: 'name', value: issuedBy"></select>
					</div>
					<div class="mb-3">
						<label class="form-label">Номер на офертата</label>
						<input type="text" class="form-control" data-bind="value: offerNumber" />
					</div>
					<div class="mb-3">
						<label class="form-label">Предмет на офертата</label>
						<input type="text" class="form-control" data-bind="value: offerSubject" />
					</div>
					<div class="mb-3">
						<label class="form-label">Дата на документа</label>
						<input type="date" class="form-control" data-bind="value: documentDateRaw" />
					</div>
					<div class="mb-3 controls-toolbar">
						<button class="btn btn-success" data-bind="click: exportPdf">Export PDF</button>
						<button class="btn btn-primary" data-bind="click: printDoc">Print</button>
					</div>
				</div>
			</div>
			<div class="col-12 mt-3">
				<div class="card p-3">
					<h5>Генерирани оферти</h5>
					<div class="table-responsive">
						<table class="table table-sm table-bordered mb-0 align-middle">
							<thead class="table-light">
								<tr>
									<th>№</th>
									<th>Наименование</th>
									<th>Размер</th>
									<th>Печат</th>
									<th>Материал</th>
									<th>Тираж</th>
									<th>Цена</th>
									<th>Действия</th>
								</tr>
							</thead>
							<tbody data-bind="foreach: items">
								<tr>
									<td data-bind="text: $index() + 1"></td>
									<td data-bind="text: name"></td>
									<td data-bind="text: size"></td>
									<td data-bind="text: printInfo"></td>
									<td data-bind="text: material"></td>
									<td data-bind="text: $root.formatQuantity(minOrder)"></td>
									<td>
										<span class="price-with-unit" data-bind="visible: !isEditingPrice(), text: formattedPrice"></span>
										<input type="number" step="any" class="form-control form-control-sm inline-price-editor"
											data-bind="visible: isEditingPrice, value: priceValue, valueUpdate: 'afterkeydown'" />
									</td>
									<td class="text-center">
										<div class="action-buttons">
											<button class="btn btn-sm btn-outline-primary icon-btn"
												data-bind="visible:$root.canEditActions(), click: $parent.togglePriceEdit, attr: { title: isEditingPrice() ? 'Запази' : 'Редакция', 'aria-label': isEditingPrice() ? 'Запази' : 'Редакция' }">
												<span data-bind="visible: !isEditingPrice()">
													<svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
														<path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-9.5 9.5L3 14l.646-3.354zM11.207 2L4 9.207V12h2.793L14 4.793z"></path>
													</svg>
												</span>
												<span data-bind="visible:isEditingPrice()">
													<svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
														<path d="M13.485 1.929a.75.75 0 0 1 1.06 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.47 6.47a.75.75 0 1 1 1.06-1.06l3.235 3.234z"></path>
													</svg>
												</span>
											</button>
											<button class="btn btn-sm btn-danger icon-btn" data-bind="click: $parent.removeItem, attr: { title: 'Изтрий', 'aria-label': 'Изтрий' }">
												<svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
													<path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0A.5.5 0 0 1 8.5 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"></path>
													<path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1 0-2H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM7 2v1h2V2z"></path>
												</svg>
											</button>
										</div>
									</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
	</div>
	<div class="pdf-container" data-bind="css: { 'dev-show': showPdfContainer }">
		<div class="pdf-container-header">
			<h5 data-bind="text: t('pdfDocumentTitle')"></h5>
		</div>
		<div id="pdf-content">
			<div class="offer-doc-header">
				<img class="offer-header-logo" src="rudi_simple_files/image005.jpg" alt="Sofel header logo" />
			</div>
			<div class=WordSection1>
	
				<div class="offer-meta-layout">
					<div class="offer-meta-left">
						<div class="offer-meta-date" data-bind="text: documentDate"></div>
						<div class="offer-contact-compact">
							<p><span data-bind="text: t('pdfToLabel')"></span>: <span class="value" data-bind="text: recipientCompany"></span></p>
							<p><span data-bind="text: t('pdfAttentionLabel')"></span>: <span class="value" data-bind="text: attentionName"></span></p>
							<p><span data-bind="text: t('pdfPhoneLabel')"></span>: <span class="value" data-bind="text: recipientPhone"></span></p>
							<p><span data-bind="text: t('pdfEmailLabel')"></span>: <span class="value" data-bind="text: recipientEmail"></span></p>
							<p><span data-bind="text: t('pdfInquiryLabel')"></span>: <span class="value" data-bind="text: inquiryFrom"></span></p>
						</div>
					</div>
					<div class="offer-cert-logos">
						<img class="offer-fssc-logo" src="rudi_simple_files/new%20offer%20version%202026%20new%20logo_files/image002.png" alt="FSSC 22000" />
						<img class="offer-fsc-logo" src="rudi_simple_files/new%20offer%20version%202026%20new%20logo_files/image001.jpg" alt="FSC" />
					</div>
				</div>
	
				<p class="MsoNoSpacing offer-intro-gap" style='margin-top:0cm;margin-bottom:0.15cm'><span
						style='font-family:"Mont ExtraLight DEMO","Century Gothic",sans-serif' data-bind="text: t('pdfIntroText')"></span></p>
	
				<p class=MsoNormal align=center style='text-align:center'><b
						style='font-size:17.0pt;line-height:110%;font-family:"Mont Heavy DEMO","Century Gothic",sans-serif'><span data-bind="text: t('pdfOfferNo')"></span><span

				var basePaperCost = perKgCount > 0 ? (paperPricePerKg / perKgCount) : 0;
				
				if (self.isPaperBagSelected()) {
					var env = self.selectedEnvelope();
					var flatHandles = env && env.flatHandels !== undefined && env.flatHandels !== null && env.flatHandels !== ''
						? parseFloat(env.flatHandels)
						: 0;
					if (isNaN(flatHandles)) flatHandles = 0;
					return (basePaperCost + flatHandles).toFixed(6);
				}
				return basePaperCost.toFixed(6);
			});

			self.laborAndOverheadEur = ko.observable(0.002);
			ko.computed(function () {
				var env = self.selectedEnvelope();
				var labor = env && env.trudAndMaterials !== undefined && env.trudAndMaterials !== null && env.trudAndMaterials !== ''
					? parseFloat(env.trudAndMaterials)
					: 0;
				if (isNaN(labor)) labor = 0;
				self.laborAndOverheadEur(labor);

			self.totalCostPerEnvelopeEur = ko.computed(function () {
				var materialCost = parseFloat(self.materialCostPerEnvelopeEur()) || 0;
				var laborCost = parseFloat(self.laborAndOverheadEur()) || 0;
				var env = self.selectedEnvelope();
				var foilBgn = parseFloat(self.foilCostPerEnvelopeEur()) || 0;
				var cashirane = parseFloat(env && env.cashirane) || 0;
				// Log the three components for envelope id === 3
				 
				var total = materialCost + laborCost + foilBgn + cashirane;
				if (env && env.id === 5) {
					total = materialCost + foilBgn+laborCost;
				}
				//console.log('Total cost per envelope (EUR):', total);
				// For envelope ID=3 include foil cost (foil is entered in BGN -> convert to EUR)
				// and include cashirane (каширане) cost defined on the envelope object
				
				return total.toFixed(6);

			self.selectedQuantity = ko.observable(self.quantitiesForSelected().length ? self.quantitiesForSelected()[0] : null);

			function calculatePriceFromBase(entry, baseValue) {
				var idx = parseFloat(entry && entry.index) || 1;
				if ((entry && entry.sign) === '*') {
					return baseValue * idx;
				}
				return idx !== 0 ? baseValue / idx : 0;
			}

			function smallestQuantityCalculatedPrice() {
				var qtys = self.quantitiesForSelected();
				if (!qtys || !qtys.length) return 0;
				var smallest = qtys[0];
				for (var i = 1; i < qtys.length; i++) {
					var currentQty = parseFloat(qtys[i].qty) || 0;
					var smallestQty = parseFloat(smallest.qty) || 0;
					if (currentQty < smallestQty) smallest = qtys[i];
				}
				var baseCost = parseFloat(self.totalCostPerEnvelopeEur()) || 0;
				return calculatePriceFromBase(smallest, baseCost);
			}

			function printColorMultiplier() {
				var color = self.selectedPrintColor();
				var percent = color && typeof color === 'object' ? (parseFloat(color.value) || 0) : 0;
				return 1 + (percent / 100);
			}

			function calculateFinalPrice(entry) {
				if (!entry) return 0;
				var basePrice;
				if (entry.sign === '/') {
					var minCalculated = smallestQuantityCalculatedPrice();
					var idx = parseFloat(entry.index) || 1;
					basePrice = idx !== 0 ? (minCalculated / idx) : 0;
				} else {
					var baseCost = parseFloat(self.totalCostPerEnvelopeEur()) || 0;
					//console.log('Calculating base price for entry:', entry, 'with base cost:', baseCost);

					basePrice = calculatePriceFromBase(entry, baseCost);

				return basePrice * printColorMultiplier();

					var perKg = parseFloat(self.envelopesPerKg()) || 0;

					minOrder: qty,
					priceUnit: priceUnit,
					priceValue: ko.observable(initialPrice.toFixed(5)),
					isEditingPrice: ko.observable(false)
				};
				item.formattedPrice = ko.pureComputed(function () {
					return formatPriceValue(item.priceValue()) + ' ' + (item.priceUnit || 'EUR/бр');
				});
				self.items.push(item);
			};

			self.togglePriceEdit = function (item) {
				var currentlyEditing = item.isEditingPrice();
				if (currentlyEditing) {
					var normalized = parseFloat(item.priceValue());
					item.priceValue(isFinite(normalized) ? normalized.toFixed(5) : '0.00000');
				}
				item.isEditingPrice(!currentlyEditing);
			};

			self.removeItem = function (item) {
				self.items.remove(item);
			};

		}

		ko.applyBindings(new ViewModel());
	</script>

</body>

</html>
